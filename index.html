<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FX LEVEL Overlay</title>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
width:1920px;
height:1080px;
overflow:hidden;
background:transparent;
}

/* =========================
   OVERLAY
========================= */

.overlay{
position:relative;
width:100%;
height:100%;
}

/* =========================
   TOP BAR
========================= */

.top-bar{

position:absolute;

top:12px;
left:50%;

transform:translateX(-50%);

width:88%;
height:60px;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 20px;

background:rgba(10,10,10,.75);

border:1px solid rgba(0,255,140,.5);

backdrop-filter:blur(6px);
}

.top-box{

display:flex;
flex-direction:column;
justify-content:center;

padding:0 12px;
}

.label{

font-size:11px;
color:#999;
letter-spacing:1px;
}

.value{

font-size:18px;
font-weight:700;

color:#00ff99;
}

/* NEWS */

.news .value{
color:#ffb347;
}

/* =========================
   CHART AREA
========================= */

.chart-area{

position:absolute;

top:85px;
left:30px;

width:1860px;
height:860px;

border:1px solid rgba(0,255,140,.15);

background:
linear-gradient(
to right,
rgba(255,255,255,.02) 1px,
transparent 1px
),

linear-gradient(
to bottom,
rgba(255,255,255,.02) 1px,
transparent 1px
);

background-size:40px 40px;
}

/* =========================
   WEBCAM
========================= */

.webcam{

position:absolute;

left:35px;
bottom:95px;

width:280px;
height:210px;

border:2px solid #00ff99;

border-radius:12px;

background:
linear-gradient(
135deg,
rgba(255,140,0,.18),
rgba(0,255,140,.10)
);

overflow:hidden;

box-shadow:
0 0 15px rgba(0,255,140,.3);
}

.chair{

width:100%;
height:100%;

display:flex;
justify-content:center;
align-items:center;

font-size:18px;
color:#ccc;
}

/* =========================
   BOTTOM BAR
========================= */

.bottom-bar{

position:absolute;

left:50%;
bottom:18px;

transform:translateX(-50%);

width:60%;
height:58px;

display:flex;

background:rgba(10,10,10,.75);

border:1px solid rgba(0,255,140,.4);
}

.stay{

width:50%;

display:flex;
justify-content:center;
align-items:center;

font-size:18px;
color:#ddd;
}

.vip{

width:50%;

display:flex;
justify-content:center;
align-items:center;

font-size:24px;
font-weight:800;

color:#ffb347;

letter-spacing:2px;
}

/* =========================
   CORNER ACCENTS
========================= */

.corner-top-left,
.corner-top-right,
.corner-bottom-left,
.corner-bottom-right{

position:absolute;

width:45px;
height:45px;

border-color:#ff9d00;
}

.corner-top-left{
top:0;
left:0;
border-top:3px solid;
border-left:3px solid;
}

.corner-top-right{
top:0;
right:0;
border-top:3px solid;
border-right:3px solid;
}

.corner-bottom-left{
bottom:0;
left:0;
border-bottom:3px solid;
border-left:3px solid;
}

.corner-bottom-right{
bottom:0;
right:0;
border-bottom:3px solid;
border-right:3px solid;
}

</style>
</head>
<body>
<div class="overlay">
<div class="top-bar">
<div class="top-box">
<div class="label">SESSION</div>
<div class="value">NEW YORK</div>
</div>
<div class="top-box">
<div class="label">NY TIME</div>
<div class="value" id="nytime">10:25</div>
</div>
<div class="top-box">
<div class="label">TEHRAN</div>
<div class="value" id="tehrantime">18:55</div>
</div>
<div class="top-box">
<div class="label">DATE</div>
<div class="value" id="date">14 JUN 2026</div>
</div>
<div class="top-box news">
<div class="label">NEWS</div>
<div class="value">HIGH IMPACT NEWS</div>
</div>
</div>
<div class="chart-area">
<div class="corner-top-left"></div>
<div class="corner-top-right"></div>
<div class="corner-bottom-left"></div>
<div class="corner-bottom-right"></div>
</div>
<div class="webcam">
<div class="chair">
🪑 CHAIR IMAGE
</div>
</div>
<div class="bottom-bar">
<div class="stay">
STAY CONNECTED
</div>
<div class="vip">
VIP SIGNAL
</div>
</div>
</div>
<script>

function updateTime(){

const now = new Date();

document.
    getElementById("date").innerText =
now.toLocaleDateString("en-GB",{
day:"2-digit",
month:"short",
year:"numeric"
});

document.getElementById("nytime").innerText =
now.toLocaleTimeString("en-US",{
timeZone:"America/New_York",
hour:"2-digit",
minute:"2-digit"
});

document.getElementById("tehrantime").innerText =
now.toLocaleTimeString("en-US",{
timeZone:"Asia/Tehran",
hour:"2-digit",
minute:"2-digit"
});

}

updateTime();

setInterval(updateTime,1000);

</script>
</body>
</html>
