<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>FXLEVEL Overlay</title>
<style>
/* صفحه اصلی */
body {
    margin: 0;
    padding: 0;
    background: #050608;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #e6e6e6;
}

/* کانتینر اصلی اورلی */
.overlay-root {
    position: relative;
    width: 1920px;
    height: 1080px;
    margin: 0 auto;
    background: radial-gradient(circle at top, #0b1b16 0%, #050608 55%, #000000 100%);
    overflow: hidden;
}

/* نوار بالا */
.top-bar {
    position: absolute;
    top: 24px;
    left: 60px;
    right: 60px;
    height: 60px;
    border-radius: 14px;
    background: rgba(5, 10, 8, 0.9);
    border: 1px solid rgba(0, 255, 136, 0.35);
    box-shadow: 0 0 18px rgba(0, 255, 136, 0.35);
    display: flex;
    align-items: center;
    padding: 0 22px;
    gap: 22px;
}

/* آیتم‌های نوار بالا */
.top-item {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #e6e6e6;
    font-size: 16px;
    font-weight: 600;
}

/* آیکون‌های نوار بالا */
.top-icon {
    width: 26px;
    height: 26px;
    stroke: #ffffff;
    fill: none;
}

/* جداکننده نوار بالا */
.top-separator {
    width: 1px;
    height: 26px;
    background: rgba(255,255,255,0.35);
}

/* بخش مارکت‌سشن‌ها */
.market-session {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
}

/* ساعت‌ها */
.clock-label {
    font-size: 14px;
    opacity: 0.8;
}

/* فریم اصلی چارت */
.chart-frame {
    position: absolute;
    top: 120px;
    left: 60px;
    width: 1320px;
    height: 780px;
    border-radius: 18px;
    border: 2px solid rgba(0, 255, 136, 0.7);
    box-shadow:
        0 0 22px rgba(0, 255, 136, 0.45),
        0 0 60px rgba(0, 255, 136, 0.25);
    background: rgba(3, 8, 6, 0.85);
}

/* ناحیه خالی برای چارت (داخل فریم) */
.chart-inner {
    position: absolute;
    top: 18px;
    left: 18px;
    right: 18px;
    bottom: 18px;
    background: transparent; /* اینجا چارت OBS می‌افته */
    overflow: hidden;
}

/* فریم وبکم */
.webcam-frame {
    position: absolute;
    right: 60px;
    bottom: 140px;
    width: 420px;
    height: 240px;
    border-radius: 16px;
    border: 2px solid rgba(0, 255, 136, 0.7);
    box-shadow:
        0 0 20px rgba(0, 255, 136, 0.45),
        0 0 50px rgba(0, 255, 136, 0.25);
    background: rgba(3, 8, 6, 0.85);
}

/* ناحیه خالی وبکم */
.webcam-inner {
    position: absolute;
    top: 14px;
    left: 14px;
    right: 14px;
    bottom: 14px;
    background: transparent; /* اینجا وبکم OBS می‌افته */
    overflow: hidden;
}

/* نوار پایین */
.bottom-bar {
    position: absolute;
    left: 60px;
    right: 60px;
    bottom: 40px;
    height: 70px;
    border-radius: 16px;
    background: rgba(5, 10, 8, 0.9);
    border: 1px solid rgba(0, 255, 136, 0.35);
    box-shadow: 0 0 18px rgba(0, 255, 136, 0.35);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 26px;
}

/* آیتم‌های نوار پایین */
.bottom-item {
    display: flex;
    align-items: center;
    gap: 12px;
}

/* متن نوار پایین */
.bottom-item span {
    font-size: 20px;
    font-weight: bold;
    color: #e6e6e6;
    text-shadow: 0 0 6px rgba(255,255,255,0.4);
    line-height: 1;
}

/* آیکون‌های نوار پایین */
.bottom-icon {
    width: 40px;
    height: 40px;
    stroke: #e6e6e6;
    fill: none;
    filter: drop-shadow(0 0 4px rgba(255,255,255,0.4));
}

/* انیمیشن SUBSCRIBE (قوی‌تر) */
.subscribe-text {
    animation: subscribePulse 3s ease-in-out infinite;
}

@keyframes subscribePulse {
    0% {
        opacity: 0.85;
        text-shadow: 0 0 8px #00ff88;
    }
    50% {
        opacity: 1;
        text-shadow: 0 0 16px #00ff88;
    }
    100% {
        opacity: 0.85;
        text-shadow: 0 0 8px #00ff88;
    }
}

/* انیمیشن نرم برای همه آیتم‌ها (به‌جز VIP) */
.soft-pulse {
    animation: softPulse 4s ease-in-out infinite;
}

@keyframes softPulse {
    0% {
        opacity: 0.85;
        text-shadow: 0 0 4px currentColor;
    }
    50% {
        opacity: 1;
        text-shadow: 0 0 10px currentColor;
}
    100% {
        opacity: 0.85;
        text-shadow: 0 0 4px currentColor;
    }
}

/* انیمیشن VIP */
.vip-signal span {
    animation: vipShine 2.8s linear infinite;
}

@keyframes vipShine {
    0% {
        text-shadow: 0 0 8px #00ff88;
    }
    50% {
        text-shadow: 0 0 18px #00ff88;
    }
    100% {
        text-shadow: 0 0 8px #00ff88;
    }
}
</style>
</head>
<body>
<div class="overlay-root">

    <!-- نوار بالا -->
    <div class="top-bar">
        <div class="top-item">
            <svg class="top-icon" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="9"/>
            </svg>
            <span>FXLEVEL</span>
        </div>

        <div class="top-separator"></div>

        <div class="top-item">
            <svg class="top-icon" viewBox="0 0 24 24">
                <path d="M4 4h16v16H4z"/>
            </svg>
            <span>London Session</span>
        </div>

        <div class="top-item market-session">
            <span class="clock-label">Tehran</span>
            <span>12:34</span>
        </div>

        <div class="top-item market-session">
            <span class="clock-label">New York</span>
            <span>05:04</span>
        </div>
    </div>

    <!-- فریم اصلی چارت -->
    <div class="chart-frame">
        <div class="chart-inner">
            <!-- اینجا چارت OBS می‌افته -->
        </div>
    </div>

    <!-- فریم وبکم -->
    <div class="webcam-frame">
        <div class="webcam-inner">
            <!-- اینجا وبکم OBS می‌افته -->
        </div>
    </div>

    <!-- نوار پایین -->
    <div class="bottom-bar">

        <div class="bottom-item vip-signal">
            <svg class="bottom-icon" viewBox="0 0 24 24">
                <path d="M12 2L2 7l10 5 10-5z"/>
            </svg>
            <span>VIP SIGNAL</span>
        </div>

        <div class="bottom-item soft-pulse">
            <svg class="bottom-icon" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/>
            </svg>
            <span>INSTAGRAM</span>
        </div>

        <div class="bottom-item soft-pulse">
            <svg class="bottom-icon" viewBox="0 0 24 24">
                <rect x="4" y="4" width="16" height="16"/>
            </svg>
            <span>WEBSITE</span>
        </div>

        <div class="bottom-item soft-pulse">
            <svg class="bottom-icon" viewBox="0 0 24 24">
                <path d="M2 12h20"/>
            </svg>
            <span>TELEGRAM</span>
        </div>

        <div class="bottom-item soft-pulse">
            <svg class="bottom-icon" viewBox="0 0 24 24">
                <path d="M4 4h16v16H4z"/>
            </svg>
            <span class="subscribe-text">SUBSCRIBE</span>
        </div>

    </div>

</div>
</body>
</html>
