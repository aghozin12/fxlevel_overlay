<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FX Overlay – Accent Test</title>

<style>
html, body {
    width: 1920px;
    height: 1080px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
}

/* فریم سبز زاویه‌دار اصلی */
.main-frame {
    position: absolute;
    top: 40px;
    left: 40px;
    width: calc(100% - 80px);
    height: calc(100% - 80px);

    clip-path: polygon(
        25px 0,
        calc(100% - 25px) 0,
        100% 25px,
        100% calc(100% - 25px),
        calc(100% - 25px) 100%,
        25px 100%,
        0 calc(100% - 25px),
        0 25px
    );

    background: rgba(0, 0, 0, 0.18);
    border: 3px solid #00ff88;
    box-shadow:
        0 0 25px #00ff88,
        inset 0 0 25px #00ff88;
}

/* قطعه نارنجی – گوشه بالا راست */
.accent-top-right {
    position: absolute;
    top: 40px;
    right: 40px;
    width: 120px;
    height: 4px;
    background: #ffae4a;
    box-shadow: 0 0 10px #ffae4a;
}

/* قطعه نارنجی – لبه پایین وسط */
.accent-bottom-center {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    height: 4px;
    background: #ffae4a;
    box-shadow: 0 0 10px #ffae4a;
}

/* قطعه نارنجی مورب – کنار چپ پایین (نزدیک وبکم) */
.accent-diagonal-left {
    position: absolute;
    bottom: 140px;
    left: 80px;
    width: 90px;
    height: 3px;
    background: #ffae4a;
    box-shadow: 0 0 10px #ffae4a;
    transform: rotate(-18deg);
    transform-origin: left center;
}
</style>
</head>
<body>

<div class="main-frame"></div>

<div class="accent-top-right"></div>
<div class="accent-bottom-center"></div>
<div class="accent-diagonal-left"></div>

</body>
</html>
