<script>
/* ---------- XAUUSD live price (با پشتیبانی از API واقعی و لاگ تشخیصی) ---------- */

/*
  تنظیمات:
  - اگر کلید API داری، مقدار API_KEY را قرار بده و USE_API=true کن.
  - اگر API مورد نظر هدر CORS ندارد، باید از پروکسی سرور استفاده کنی (مثلاً Cloudflare Worker یا سرور ساده Node).
*/
const USE_API = true; // true => تلاش برای استفاده از API واقعی؛ false => استفاده از نمونه/proxy
const API_PROVIDER = "GoldAPI"; // فقط برای خوانایی؛ در fetch از URL و هدر استفاده می‌شود
const API_KEY = "YOUR_API_KEY_HERE"; // <-- اینجا کلیدت را قرار بده (اگر داری)

// مثال endpoint برای GoldAPI (نیاز به x-access-token header دارد)
// const API_URL_DIRECT = "https://www.goldapi.io/api/XAU/USD";

// مثال endpoint برای Metals-API یا دیگران را مطابق مستندات آن سرویس جایگزین کن.
// اگر API مستقیم از مرورگر CORS را بلاک کند، از پروکسی استفاده کن:
const USE_PROXY = false; // اگر API CORS ندارد، true کن و proxyUrl را تنظیم کن
const proxyUrl = "https://your-proxy.example.com/?url="; // پروکسی باید هدر Access-Control-Allow-Origin اضافه کند

let lastXauPrice = null;
const xauEl = document.getElementById("xauusd-value");

function formatPrice(p){
  return Number(p).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
}
function flashXau(){
  xauEl.classList.add("xau-updated");
  setTimeout(()=> xauEl.classList.remove("xau-updated"), 220);
}

/* تابعی که قیمت را از API واقعی می‌گیرد */
async function fetchXauFromRealApi(){
  if(!API_KEY || API_KEY === "YOUR_API_KEY_HERE") {
    throw new Error("No API key provided");
  }

  // مثال برای GoldAPI
  let url = "https://www.goldapi.io/api/XAU/USD";
  let fetchOptions = {
    method: "GET",
    headers: {
      "x-access-token": API_KEY,
      "Content-Type": "application/json"
    },
    cache: "no-store"
  };

  if(USE_PROXY){
    url = proxyUrl + encodeURIComponent(url);
    // در حالت پروکسی ممکن است هدرها متفاوت باشند؛ بعضی پروکسی‌ها هدرها را عبور نمی‌دهند
  }

  const res = await fetch(url, fetchOptions);
  if(!res.ok) throw new Error("API response not ok: " + res.status);
  const json = await res.json();
  // GoldAPI نمونه خروجی: { "price": 1960.12, "timestamp": 167... , "unit": "USD" }
  if(json && (json.price || json.ask || json.bid)){
    // ترجیح: استفاده از price، سپس ask/bid
    const p = Number(json.price || json.ask || json.bid);
    if(Number.isFinite(p)) return p;
  }
  // اگر ساختار متفاوت بود، تلاش برای یافتن اولین عدد
  const txt = JSON.stringify(json);
  const m = txt.match(/([0-9]+(?:\.[0-9]+)?)/);
  if(m) return Number(m[1]);
  throw new Error("Unable to parse price from API response");
}

/* تابعی که قیمت را از منابع عمومی یا proxy می‌گیرد (fallback) */
async function fetchXauFromSample(){
  // نمونه: metals.live via allorigins proxy (ممکن است گاهی کار نکند)
  const sampleProxy = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://api.metals.live/v1/spot");
  const res = await fetch(sampleProxy, {cache: "no-store"});
  if(!res.ok) throw new Error("Sample proxy response not ok: " + res.status);
  const json = await res.json();
  const contents = json.contents || json;
  let parsed = null;
  try { parsed = typeof contents === "string" ? JSON.parse(contents) : contents; } catch(e){ parsed = contents; }
  if(Array.isArray(parsed)){
    // metals.live ممکن است [{symbol:"XAU", price:1960.12}, ...]
    const x = parsed.find(it => (it.symbol && /XAU/i.test(it.symbol)) || (it.code && /XAU/i.test(it.code)));
    if(x && x.price) return Number(x.price);
    for(const it of parsed){
      if(it.price) return Number(it.price);
    }
  }
  // تلاش برای یافتن عدد در متن
  const text = JSON.stringify(parsed);
  const m = text.match(/([0-9]+(?:\.[0-9]+)?)/);
  if(m) return Number(m[1]);
  throw new Error("Unable to parse sample response");
}

/* تابع اصلی به‌روزرسانی قیمت */
async function updateXau(){
  try{
    let price = null;
    if(USE_API){
      try{
        price = await fetchXauFromRealApi();
        console.log("XAU price from real API:", price);
      }catch(apiErr){
        console.warn("Real API failed:", apiErr.message);
        // اگر API واقعی شکست خورد، تلاش برای sample
        price = await fetchXauFromSample();
        console.log("XAU price from sample fallback:", price);
      }
    } else {
      price = await fetchXauFromSample();
      console.log("XAU price from sample:", price);
    }

    if(Number.isFinite(price)){
      lastXauPrice = price;
      xauEl.innerText = formatPrice(price);
      flashXau();
      return;
    }
    throw new Error("Invalid price value");
  }catch(err){
    console.warn("updateXau error:", err);
    // fallback شبیه‌سازی: اگر قیمت قبلی داریم، نوسان کوچک ایجاد کن، در غیر این صورت مقدار فرضی
    if(lastXauPrice === null){
      lastXauPrice = 1960.00;
    } else {
      const change = (Math.random() - 0.5) * 0.002 * lastXauPrice; // ±0.1%
      lastXauPrice = Math.max(0, lastXauPrice + change);
    }
    xauEl.innerText = formatPrice(lastXauPrice) + " *";
    flashXau();
  }
}

/* اجرا و زمان‌بندی */
updateXau();
setInterval(updateXau, 3000); // هر 3 ثانیه آپدیت می‌شود
</script>
