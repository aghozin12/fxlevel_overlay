<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FX Overlay</title>

<style>

/* صفحه ثابت */
html, body {
    width: 1920px;
    height: 1080px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
}

/* افکت شبکه‌ای پس‌زمینه */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(rgba(0,255,136,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
}

/* فریم سبز زاویه‌دار */
.main-frame {
    position: absolute;
    top: 40px;
    left: 40px;
    width: calc(100% - 80px);
    height: calc(100% - 80px);

    clip-path: polygon(
        25px 0,
        calc(100% - 25px) 0,
        100% 25px,
        100% calc(100% - 25px),
        calc(100% - 25px) 100%,
        25px 100%,
        0 calc(100% - 25px),
        0 25px
    );

    background: rgba(0, 0, 0, 0.18);
    border: 3px solid #00ff88;
    box-shadow:
        0 0 25px #00ff88,
        inset 0 0 25px #00ff88;
}

/* خط نارنجی دور فریم (بیرون از clip-path) */
.main-frame-outline {
    position: absolute;
    top: 40px;
    left: 40px;
    width: calc(100% - 80px);
    height: calc(100% - 80px);
    border: 1px solid #ffae4a;
    pointer-events: none;
}

/* نوار بالا سبز زاویه‌دار */
.top-bar {
    position: absolute;
    top: 55px;
    left: 50%;
    transform: translateX(-50%);

    width: 86%;
    height: 80px;

    clip-path: polygon(
        18px 0,
        calc(100% - 18px) 0,
        100% 18px,
        100% 100%,
        0 100%,
        0 18px
    );

    background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.45),
        rgba(0, 0, 0, 0.25)
    );

    border: 2px solid #00ff88;
    box-shadow:
        0 0 14px #00ff88,
        inset 0 0 14px #00ff88;

    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    box-sizing: border-box;
}

/* خط نارنجی دور نوار بالا (بیرون از clip-path) */
.top-bar-outline {
    position: absolute;
    top: 55px;
    left: 50%;
    transform: translateX(-50%);
    width: 86%;
    height: 80px;
    border: 1px solid #ffae4a;
    pointer-events: none;
}

/* آیتم‌های نوار بالا */
.top-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    text-align: center;
    font-size: 14px;
    color: #d0ffd0;
}

.top-item span:first-child {
    font-size: 12px;
    color: #ffae4a;
    text-shadow: 0 0 6px #ffae4a;
}

.top-item span:last-child {
    font-size: 18px;
    font-weight: bold;
    color: #00ff88;
    text-shadow: 0 0 8px #00ff88;
}

/* نوار پایین سبز زاویه‌دار */
.bottom-bar {
    position: absolute;
    bottom: 55px;
    left: 50%;
    transform: translateX(-50%);

    width: 86%;
    height: 80px;

    clip-path: polygon(
        0 0,
        100% 0,
        100% calc(100% - 18px),
        calc(100% - 18px) 100%,
        18px 100%,
        0 calc(100% - 18px)
    );

    background: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.45),
        rgba(0, 0, 0, 0.25)
    );

    border: 2px solid #00ff88;
    box-shadow:
        0 0 14px #00ff88,
        inset 0 0 14px #00ff88;

    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    box-sizing: border-box;
}

/* خط نارنجی دور نوار پایین (بیرون از clip-path) */
.bottom-bar-outline {
    position: absolute;
    bottom: 55px;
    left: 50%;
    transform: translateX(-50%);
    width: 86%;
    height: 80px;
    border: 1px solid #ffae4a;
    pointer-events: none;
}

.bottom-left {
    font-size: 28px;
    font-weight: bold;
    color: #00ff88;
    text-shadow: 0 0 10px #00ff88;
}

.bottom-right {
    display: flex;
    gap: 40px;
    font-size: 20px;
    color: #ffae4a;
    text-shadow: 0 0 8px #ffae4a;
}

/* قاب وبکم سبز زاویه‌دار */
.webcam-frame {
    position: absolute;
    bottom: 170px;
    left: 80px;

    width: 430px;
    height: 250px;

    clip-path: polygon(
        20px 0,


calc(100% - 20px) 0,
        100% 20px,
        100% calc(100% - 20px),
        calc(100% - 20px) 100%,
        20px 100%,
        0 calc(100% - 20px),
        0 20px
    );

    background: rgba(0, 0, 0, 0.25);
    border: 3px solid #00ff88;
    box-shadow:
        0 0 18px #00ff88,
        inset 0 0 18px #00ff88;
}

/* خط نارنجی دور قاب وبکم (بیرون از clip-path) */
.webcam-frame-outline {
    position: absolute;
    bottom: 170px;
    left: 80px;
    width: 430px;
    height: 250px;
    border: 1px solid #ffae4a;
    pointer-events: none;
}

</style>
</head>

<body>

<div class="main-frame"></div>
<div class="main-frame-outline"></div>

<div class="top-bar"></div>
<div class="top-bar-outline"></div>

<div class="bottom-bar">
    <div class="bottom-left">FX LEVEL</div>
    <div class="bottom-right">
        <span>Instagram</span>
        <span>Telegram</span>
        <span>VIP SIGNAL</span>
    </div>
</div>
<div class="bottom-bar-outline"></div>

<div class="webcam-frame"></div>
<div class="webcam-frame-outline"></div>

<!-- محتوای نوار بالا (جدا از خود باکس برای اینکه روی outline نیفته) -->
<div class="top-bar" style="pointer-events:none;">
    <div class="top-item"><span>SESSION</span><span>London</span></div>
    <div class="top-item"><span>NEW YORK</span><span>--:--</span></div>
    <div class="top-item"><span>TEHRAN</span><span>--:--</span></div>
    <div class="top-item"><span>DATE</span><span>-- --- ----</span></div>
    <div class="top-item"><span>NEWS</span><span>Waiting...</span></div>
</div>

</body>
</html>
