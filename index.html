<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Overlay + Starting Soon</title>

<style>

/* ——————————————————————— */
/*  استایل اورلی اصلی (فریم وبکم)  */
/* ——————————————————————— */

.webcam-frame {
    position: absolute;
    bottom: 170px;
    left: 80px;

    width: 430px;
    height: 250px;

    border: 4px solid #00ff66;
    background: rgba(0, 0, 0, 0.18);

    box-shadow:
        0 0 22px rgba(0, 255, 102, 1),
        0 0 55px rgba(0, 255, 102, 0.85),
        0 0 110px rgba(0, 255, 102, 0.65),
        0 0 160px rgba(0, 255, 102, 0.45);
}

/* ——————————————————————— */
/*  استایل صفحه Starting Soon  */
/* ——————————————————————— */

.starting-soon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    z-index: 999;
}

.title {
    color: #ffeb00;
    font-size: 36px;
    margin-bottom: 10px;
}

.main-text {
    font-size: 64px;
    font-weight: 700;
}

.cyan { color: #00fff0; }
.purple { color: #a000ff; }

#countdown {
    font-size: 72px;
    font-weight: 800;
    margin-top: 20px;
    color: #ffffff;
    text-shadow:
        0 0 12px #ffffff,
        0 0 24px #00fff0,
        0 0 48px #00fff0;
}

/* ——————————————————————— */
/*  افکت محو شدن بعد از پایان تایمر  */
/* ——————————————————————— */

.fade-out {
    animation: fadeOut 1.5s ease forwards;
}

@keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; visibility: hidden; }
}

</style>
</head>

<body>

<!-- ——————————————————————— -->
<!--  اورلی اصلی  -->
<!-- ——————————————————————— -->

<div class="webcam-frame"></div>


<!-- ——————————————————————— -->
<!--  صفحه Starting Soon  -->
<!-- ——————————————————————— -->

<div class="starting-soon" id="startScreen">
    <h2 class="title">Live Trade</h2>

    <h1 class="main-text">
        <span class="cyan">STARTING</span>
        <span class="purple">SOON</span>
    </h1>

    <div id="countdown">10:00</div>
</div>


<!-- ——————————————————————— -->
<!--  تایمر ۱۰ دقیقه‌ای  -->
<!-- ——————————————————————— -->

<script>
let time = 10 * 60; // 10 دقیقه
const countdown = document.getElementById("countdown");
const startScreen = document.getElementById("startScreen");

const timer = setInterval(() => {
    const minutes = Math.floor(time / 60);
    const seconds = time % 60;

    countdown.textContent =
        ${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")};

    if (time > 0) {
        time--;
    } else {
        clearInterval(timer);

        // محو شدن صفحه Starting Soon
        startScreen.classList.add("fade-out");
    }
}, 1000);
</script>

</body>
</html>
