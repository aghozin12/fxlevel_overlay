<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FX Overlay</title>

<style>

/* صفحه ثابت */
html, body {
    width: 1920px;
    height: 1080px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
}

/* فریم زاویه‌دار اصلی */
.main-frame {
    position: absolute;
    top: 40px;
    left: 40px;
    width: calc(100% - 80px);
    height: calc(100% - 80px);

    clip-path: polygon(
        25px 0,
        calc(100% - 25px) 0,
        100% 25px,
        100% calc(100% - 25px),
        calc(100% - 25px) 100%,
        25px 100%,
        0 calc(100% - 25px),
        0 25px
    );

    border: 3px solid #00ff88;
    box-shadow:
        0 0 25px #00ff88,
        inset 0 0 25px #00ff88;
    background: rgba(0, 0, 0, 0.18);
}

/* نوار بالا زاویه‌دار */
.top-bar {
    position: absolute;
    top: 55px; /* نزدیک‌تر به لبه */
    left: 50%;
    transform: translateX(-50%);

    width: 86%; /* کمی باریک‌تر برای شبیه‌سازی عکس */
    height: 80px;

    clip-path: polygon(
        18px 0,
        calc(100% - 18px) 0,
        100% 18px,
        100% 100%,
        0 100%,
        0 18px
    );

    background: rgba(0, 0, 0, 0.35);
    border: 2px solid #00ff88;
    box-shadow:
        0 0 14px #00ff88,
        inset 0 0 14px #00ff88;

    display: flex;
    justify-content: space-between; /* تقسیم مساوی */
    align-items: center;
    padding: 0 40px;
    box-sizing: border-box;
}

/* آیتم‌های نوار بالا */
.top-item {
    flex: 1; /* تقسیم مساوی */
    display: flex;
    flex-direction: column;
    text-align: center;
    font-size: 14px;
    color: #d0ffd0;
}

.top-item span:first-child {
    font-size: 12px;
    color: #ffae4a;
    text-shadow: 0 0 6px #ffae4a;
}

.top-item span:last-child {
    font-size: 18px;
    font-weight: bold;
    color: #00ff88;
    text-shadow: 0 0 8px #00ff88;
}

/* نوار پایین زاویه‌دار */
.bottom-bar {
    position: absolute;
    bottom: 55px;
    left: 50%;
    transform: translateX(-50%);

    width: 86%;
    height: 80px;

    clip-path: polygon(
        0 0,
        100% 0,
        100% calc(100% - 18px),
        calc(100% - 18px) 100%,
        18px 100%,
        0 calc(100% - 18px)
    );

    background: rgba(0, 0, 0, 0.35);
    border: 2px solid #00ff88;
    box-shadow:
        0 0 14px #00ff88,
        inset 0 0 14px #00ff88;

    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    box-sizing: border-box;
}

.bottom-left {
    font-size: 28px;
    font-weight: bold;
    color: #00ff88;
    text-shadow: 0 0 10px #00ff88;
}

.bottom-right {
    display: flex;
    gap: 40px;
    font-size: 20px;
    color: #ffae4a;
    text-shadow: 0 0 8px #ffae4a;
}

/* قاب وبکم زاویه‌دار */
.webcam-frame {
    position: absolute;
    bottom: 170px;
    left: 80px;

    width: 430px;
    height: 250px;

    clip-path: polygon(
        20px 0,
        calc(100% - 20px) 0,
        100% 20px,
        100% calc(100% - 20px),
        calc(100% - 20px) 100%,
        20px 100%,
        0 calc(100% - 20px),
        0 20px
    );

    border: 3px solid #00ff88;
    box-shadow:
        0 0 18px #00ff88,
        inset 0 0 18px #00ff88;
}

</style>
</head>

<body>

<div class="main-frame"></div>

<div class="top-bar">
    <div class="top-item"><span>SESSION</span><span>London</span></div>
    <div class="top-item"><span>NEW YORK</span><span>--:--</span></div>
    <div class="top-item"><span>TEHRAN</span><span>--:--</span></div>
    <div class="top-item"><span>DATE</span><span>-- --- ----</span></div>
    <div class="top-item"><span>NEWS</span><span>Waiting...</span></div>
</div>

<div class="webcam-frame"></div>

<div class="bottom-bar">
    <div class="bottom-left">FX LEVEL</div>
    <div class="bottom-right">
        <span>Instagram</span>
        <span>Telegram</span>
        <span>VIP SIGNAL</span>
    </div>
</div>

</body>
</html>
