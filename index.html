<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FX Overlay</title>

<style>

/* صفحه ثابت */
html, body {
    width: 1920px;
    height: 1080px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
}

/* افکت شبکه‌ای پس‌زمینه */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(rgba(0,255,136,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
}

/* فریم زاویه‌دار اصلی */
.main-frame {
    position: absolute;
    top: 40px;
    left: 40px;
    width: calc(100% - 80px);
    height: calc(100% - 80px);

    clip-path: polygon(
        25px 0,
        calc(100% - 25px) 0,
        100% 25px,
        100% calc(100% - 25px),
        calc(100% - 25px) 100%,
        25px 100%,
        0 calc(100% - 25px),
        0 25px
    );

    background: rgba(0, 0, 0, 0.18);

    border: 3px solid #00ff88;
    box-shadow:
        0 0 25px #00ff88,
        inset 0 0 25px #00ff88;
}

/* خطوط نارنجی واقعی روی فریم */
.main-frame::before {
    content: "";
    position: absolute;
    inset: 0;
    clip-path: inherit;
    border: 1px solid #ffae4a;
    opacity: 0.8;
    pointer-events: none;
}

/* نوار بالا زاویه‌دار */
.top-bar {
    position: absolute;
    top: 55px;
    left: 50%;
    transform: translateX(-50%);

    width: 86%;
    height: 80px;

    clip-path: polygon(
        18px 0,
        calc(100% - 18px) 0,
        100% 18px,
        100% 100%,
        0 100%,
        0 18px
    );

    background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.45),
        rgba(0, 0, 0, 0.25)
    );

    border: 2px solid #00ff88;
    box-shadow:
        0 0 14px #00ff88,
        inset 0 0 14px #00ff88;

    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    box-sizing: border-box;
}

/* خطوط نارنجی واقعی داخل نوار بالا */
.top-bar::before {
    content: "";
    position: absolute;
    inset: 6px;
    clip-path: inherit;
    border: 1px solid #ffae4a;
    opacity: 0.8;
    pointer-events: none;
}

/* آیتم‌های نوار بالا */
.top-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    text-align: center;
    font-size: 14px;
    color: #d0ffd0;
}

.top-item span:first-child {
    font-size: 12px;
    color: #ffae4a;
    text-shadow: 0 0 6px #ffae4a;
}

.top-item span:last-child {
    font-size: 18px;

    text-shadow: 0 0 8px #00ff88;
}

}
