<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>FX LEVEL Overlay</title>
<style>
:root{
  --bg:#000;
  --neon:#00ff88;
  --neon-strong:rgba(0,255,102,0.95);
  --accent:#ffae4a;
  --gold-green:#7CFC00; /* رنگ سبز برای قیمت طلا */
  --grid-alpha:0.05;
  --frame-opacity:0.18;
  --soft-blue:#4da6ff;
}

/* پایه */
*{box-sizing:border-box}
html,body{height:100%;margin:0;padding:0;background:var(--bg);color:#fff;font-family:Arial, sans-serif;overflow:hidden}
body{position:relative}

/* شبکه پس‌زمینه */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,255,136,var(--grid-alpha)) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,136,var(--grid-alpha)) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
  opacity:0.9;
}

/* قاب نئونی دور صفحه (مثل نسخه اول) */
.page-frame {
  position:fixed;
  inset:20px;
  pointer-events:none;
  z-index:50;
  border:3px solid var(--neon);
  box-shadow:
    0 0 25px var(--neon),
    0 0 55px rgba(0,255,102,0.85),
    0 0 110px rgba(0,255,102,0.65),
    0 0 160px rgba(0,255,102,0.45),
    inset 0 0 25px rgba(0,255,102,0.12);
  clip-path:polygon(
    25px 0,
    calc(100% - 25px) 0,
    100% 25px,
    100% calc(100% - 25px),
    calc(100% - 25px) 100%,
    25px 100%,
    0 calc(100% - 25px),
    0 25px
  );
}

/* فریم اصلی داخلی */
.main-frame{
  position:absolute;
  inset:40px;
  background:rgba(0,0,0,var(--frame-opacity));
  z-index:1;
  display:flex;
  flex-direction:column;
}

/* نوار بالا - آیکون‌ها و متن بزرگتر و وسط چین */
.top-bar{
  margin:55px auto 0;
  width:86%;
  height:96px; /* کمی بلندتر برای آیکون و فونت بزرگتر */
  background:rgba(0,0,0,0.35);
  border:2px solid var(--neon);
  box-shadow:0 0 14px var(--neon), inset 0 0 14px rgba(0,255,136,0.12);
  display:flex;
  align-items:center;
  justify-content:center; /* وسط چین کردن همه آیتم‌ها */
  gap:18px; /* فاصله بین آیتم‌ها */
  padding:0 18px;
  z-index:60;
  border-radius:8px;
}

/* آیتم‌های نوار بالا: 6 آیتم مرتب و وسط */
.top-item{display:flex;align-items:center;gap:12px;padding:6px 10px;min-width:0}
.item-row{display:flex;align-items:center;gap:12px}

/* آیکون و فونت بزرگتر فقط برای نوار بالا */
.top-bar .icon{width:48px;height:48px;stroke:#fff;fill:none;filter:drop-shadow(0 0 8px var(--neon))}
.top-bar .text-box{display:flex;flex-direction:column;line-height:1.02;min-width:0}
.top-bar .text-box span:first-child{font-size:13px;color:var(--accent);text-shadow:0 0 6px var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-bar .text-box span:last-child{font-size:20px;font-weight:800;color:var(--neon);text-shadow:0 0 10px var(--neon);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* جداکننده */
.divider{width:1px;height:60%;background:rgba(255,255,255,0.12);margin:0 6px}

/* کادر XAUUSD مخصوص */
.xau-box{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:4px;
  padding:6px 12px;
  background:rgba(0,0,0,0.12);
  border:1px solid rgba(255,255,255,0.04);
  border-radius:8px;
  min-width:140px;
}
.xau-box .label{font-size:13px;color:var(--accent);text-shadow:0 0 6px var(--accent)}
.xau-box .price{font-size:20px;font-weight:900;color:var(--gold-green);text-shadow:0 0 10px rgba(124,252,0,0.25);transition:transform .18s ease, box-shadow .18s ease}

/* افکت کوتاه هنگام آپدیت قیمت */
.xau-updated {
  transform:scale(1.06);
  box-shadow:0 0 18px rgba(124,252,0,0.9), 0 0 40px rgba(124,252,0,0.6);
}

/* قاب وبکم نئونی (بدون متن یا آیکون داخل) */
.webcam-frame{
  position:absolute;
  left:80px;
  bottom:170px;
  width:clamp(280px,25vw,430px);
  height:clamp(160px,18vh,250px);
  border:4px solid #00ff66;
  background:rgba(0,0,0,0.12);
  box-shadow:
    0 0 25px rgba(0, 255, 102, 1),
    0 0 55px rgba(0, 255, 102, 0.85),
    0 0 110px rgba(0, 255, 102, 0.65),
    0 0 160px rgba(0, 255, 102, 0.45);
  z-index:30;
  animation:neonPulse 2.4s ease-in-out infinite alternate;
  will-change:box-shadow;
  display:block;
  overflow:hidden;
  pointer-events:auto;
  box-sizing:border-box;
}
.webcam-inner{width:100%;height:100%;display:block;background:transparent}

/* نوار پایین */
.bottom-bar{
  position:absolute;
  bottom:55px;
  left:50%;
  transform:translateX(-50%);
  width:86%;
  height:80px;
  background:rgba(0,0,0,0.35);
  border:2px solid var(--neon);
  box-shadow:0 0 14px var(--neon), inset 0 0 14px rgba(0,255,136,0.12);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 40px;
  box-sizing:border-box;
  z-index:20;
  border-radius:8px;
}
.bottom-item{display:flex;align-items:center;gap:10px;color:#fff}
.bottom-item span{line-height:1;display:flex;align-items:center}
.bottom-icon{width:40px;height:40px;stroke:#fff;fill:none;filter:drop-shadow(0 0 4px #ffb347)}
.bottom-divider{width:1px;height:45%;background:rgba(255,255,255,0.35)}

/* انیمیشن نئونی بهینه */
@keyframes neonPulse{
  from{box-shadow:0 0 18px var(--neon-strong)}
  to{box-shadow:0 0 28px var(--neon-strong)}
}

/* افکت‌ها */
.subscribe span{animation:softGlow 2.5s infinite ease-in-out}
.soft-pulse{animation:softPulse 4s ease-in-out infinite}
@keyframes softPulse{
  0%{opacity:0.85;text-shadow:0 0 4px currentColor}
  50%{opacity:1;text-shadow:0 0 10px currentColor}
  100%{opacity:0.85;text-shadow:0 0 4px currentColor}
}
@keyframes softGlow{
  0%{text-shadow:0 0 4px var(--neon);opacity:0.8}
  50%{text-shadow:0 0 12px var(--neon);opacity:1}
  100%{text-shadow:0 0 4px var(--neon);opacity:0.8}
}

/* VIP */
.vip{position:relative;overflow:hidden}
.vip span{animation:vipPulse 1.8s infinite ease-in-out}
@keyframes vipPulse{0%{text-shadow:0 0 6px var(--neon)}50%{text-shadow:0 0 18px var(--neon)}100%{text-shadow:0 0 6px var(--neon)}}
.vip .shine{position:absolute;top:0;left:-120%;width:80%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,0.35),transparent);animation:shineSweep 3s infinite}
@keyframes shineSweep{0%{left:-120%}50%{left:120%}100%{left:120%}}

/* کاهش حرکت برای کاربرانی که ترجیح می‌دهند */
@media (prefers-reduced-motion:reduce){
  .webcam-frame, .vip .shine, .subscribe span, .soft-pulse{animation:none}
}

/* موبایل */
@media (max-width:800px){
  .top-bar{height:84px;padding:0 10px;gap:10px}
  .top-bar .icon{width:40px;height:40px}
  .top-bar .text-box span:last-child{font-size:16px}
  .webcam-frame{left:16px;bottom:110px;width:40vw;height:24vh}
  .bottom-bar{padding:0 12px}
  .xau-box{min-width:110px}
}
</style>
</head>
<body>
  <!-- قاب نئونی دور کل صفحه -->
  <div class="page-frame" aria-hidden="true"></div>

  <!-- قاب داخلی -->
  <div class="main-frame" role="region" aria-label="FX LEVEL main frame"></div>

  <!-- نوار بالا (6 آیتم مرتب و وسط) -->
  <div class="top-bar" role="banner" aria-label="Top status bar">
    <!-- 1 SESSION -->
    <div class="top-item" aria-hidden="false">
      <div class="item-row">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10" stroke-width="2"/></svg>
        <div class="text-box"><span>SESSION</span><span id="session-value">London</span></div>
      </div>
    </div>

    <div class="divider" aria-hidden="true"></div>

    <!-- 2 XAUUSD -->
    <div class="top-item" aria-hidden="false">
      <div class="xau-box" role="status" aria-label="XAUUSD price">
        <div class="label">XAUUSD</div>
        <div id="xauusd-value" class="price">--</div>
      </div>
    </div>

    <div class="divider" aria-hidden="true"></div>

    <!-- 3 NEW YORK -->
    <div class="top-item">
      <div class="item-row">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 1v22M1 12h22" stroke-width="2"/></svg>
        <div class="text-box"><span>NEW YORK</span><span id="newyork-value">--:--</span></div>
      </div>
    </div>

    <div class="divider" aria-hidden="true"></div>

    <!-- 4 TEHRAN -->
    <div class="top-item">
      <div class="item-row">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10" stroke-width="2"/></svg>
        <div class="text-box"><span>TEHRAN</span><span id="tehran-value">--:--</span></div>
      </div>
    </div>

    <div class="divider" aria-hidden="true"></div>

    <!-- 5 DATE -->
    <div class="top-item">
      <div class="item-row">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="16" stroke-width="2" fill="none"/></svg>
        <div class="text-box"><span>DATE</span><span id="date-value">-- --- ----</span></div>
      </div>
    </div>

    <div class="divider" aria-hidden="true"></div>

    <!-- 6 NEWS -->
    <div class="top-item">
      <div class="item-row">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="16" stroke-width="2" fill="none"/></svg>
        <div class="text-box"><span>NEWS</span><span id="news-value">Loading...</span></div>
      </div>
    </div>
  </div>

  <!-- قاب وبکم نئونی -->
  <div class="webcam-frame" role="region" aria-label="Webcam frame">
    <div class="webcam-inner" aria-hidden="true"></div>
  </div>

  <!-- نوار پایین -->
  <div class="bottom-bar" role="contentinfo" aria-label="Bottom info bar">
    <div class="bottom-item subscribe"><svg class="bottom-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22s8-4 8-10V6l-8-4-8 4v6c0 6 8 10 8 10z" stroke-width="2"/></svg><span>SUBSCRIBE</span></div>
    <div class="bottom-divider" aria-hidden="true"></div>

    <div class="bottom-item"><svg class="bottom-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10" stroke-width="2"/></svg><span>freeforexsignal.org</span></div>
    <div class="bottom-divider" aria-hidden="true"></div>

    <div class="bottom-item"><svg class="bottom-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5" stroke-width="2"/><circle cx="12" cy="12" r="4" stroke-width="2"/></svg><span>instagram.com/fx_level3</span></div>
    <div class="bottom-divider" aria-hidden="true"></div>

    <div class="bottom-item"><svg class="bottom-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="6" width="18" height="12" rx="3" stroke-width="2"/><polygon points="10,9 16,12 10,15" fill="#fff"/></svg><span>youtube.com/@FX_LEVEL3</span></div>
    <div class="bottom-divider" aria-hidden="true"></div>

    <div class="bottom-item"><svg class="bottom-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M22 2L11 13" stroke-width="2"/></svg><span>t.me/FX_LEVEL3</span></div>
    <div class="bottom-divider" aria-hidden="true"></div>

    <div class="bottom-item vip" aria-hidden="false"><svg class="bottom-icon diamond" viewBox="0 0 24 24" aria-hidden="true"><polygon points="12 2 22 9 12 22 2 9" stroke-width="2"/></svg><span>VIP SIGNAL — @FX_LEVEL3_Support</span><div class="shine" aria-hidden="true"></div></div>
  </div>

<script>
/* به‌روزرسانی ساعت و سشن */
function updateClocks(){
  try{
    const tehranTime = new Date().toLocaleTimeString("en-US",{timeZone:"Asia/Tehran",hour:"2-digit",minute:"2-digit",hour12:true});
    const newYorkTime = new Date().toLocaleTimeString("en-US",{timeZone:"America/New_York",hour:"2-digit",minute:"2-digit",hour12:true});
    const today = new Date().toLocaleDateString("en-US",{timeZone:"Asia/Tehran",day:"2-digit",month:"short",year:"numeric"});

    const tehranHourStr = new Date().toLocaleString("en-US",{timeZone:"Asia/Tehran",hour:"numeric",hour12:false});
    const tehranHour = parseInt(tehranHourStr,10);
    const sessionName = (Number.isFinite(tehranHour) && tehranHour < 17) ? "London" : "New York";

    document.getElementById("session-value").innerText = sessionName;
    document.getElementById("tehran-value").innerText = tehranTime;
    document.getElementById("newyork-value").innerText = newYorkTime;
    document.getElementById("date-value").innerText = today;
  }catch(e){
    console.error("Clock update error", e);
  }
}
setInterval(updateClocks,1000);
updateClocks();

/* دریافت خبر از RSS با فیلتر دلاری (نمونه: Forexlive) */
async function updateNews(){
  const targetEl = document.getElementById("news-value");
  try{
    const rssUrl = "https://www.forexlive.com/feed";
    const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(rssUrl);
    const res = await fetch(proxy, {cache: "no-store"});
    if(!res.ok) throw new Error("Network response not ok");
    const json = await res.json();
    const xml = new DOMParser().parseFromString(json.contents, "text/xml");
    const items = xml.querySelectorAll("item > title");
    if(!items || items.length === 0){
      targetEl.innerText = "No news available";
      return;
    }
    let found = null;
    for(const t of items){
      const txt = t.textContent.trim();
      if(/USD|Dollar|DXY|USD\//i.test(txt)){
        found = txt;
        break;
      }
    }
    const display = found || items[0].textContent.trim();
    targetEl.innerText = display.length > 70 ? display.slice(0,70) + "..." : display;
  }catch(err){
    console.warn("News fetch failed", err);
    targetEl.innerText = "News unavailable";
  }
}
updateNews();
setInterval(updateNews,30000);

/* ---------- XAUUSD live price (سبز و آپدیت لحظه‌ای با افکت) ---------- */
let lastXauPrice = null;
const xauEl = document.getElementById("xauusd-value");

// اگر API واقعی داری این URL را جایگزین کن.
// توجه: بسیاری از APIها نیاز به کلید و/یا پروکسی CORS دارند.
// مثال: metals-api, goldapi.io, یا هر سرویس دلخواه.
const priceApiDirect = null; // مثال: "https://api.example.com/xauusd?apikey=YOUR_KEY"

// برای نمونه تلاش می‌کنیم از metals.live استفاده کنیم (ممکن است CORS داشته باشد)
const sampleApi = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://api.metals.live/v1/spot");

/* قالب‌بندی قیمت */
function formatPrice(p){
  return Number(p).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
}

/* اضافه کردن افکت کوتاه هنگام آپدیت */
function flashXau(){
  xauEl.classList.add("xau-updated");
  setTimeout(()=> xauEl.classList.remove("xau-updated"), 220);
}

/* تلاش برای گرفتن قیمت از API نمونه */
async function fetchXauFromApi(){
  if(priceApiDirect){
    // اگر URL مستقیم API مشخص شده، از آن استفاده کن
    const r = await fetch(priceApiDirect, {cache:"no-store"});
    if(!r.ok) throw new Error("API error");
    const j = await r.json();
    // انتظار داریم j.price یا ساختار مشابه داشته باشد — در صورت نیاز این بخش را مطابق API خودت تغییر بده
    if(j && (j.price || j.price_usd || j.bid)) {
      return Number(j.price || j.price_usd || j.bid);
    }
    // تلاش برای یافتن اولین عدد در پاسخ
    const txt = JSON.stringify(j);
    const m = txt.match(/([0-9]+(?:\.[0-9]+)?)/);
    if(m) return Number(m[1]);
    throw new Error("Unable to parse direct API response");
  } else {
    // استفاده از sampleApi (allorigins -> metals.live)
    const r = await fetch(sampleApi, {cache:"no-store"});
    if(!r.ok) throw new Error("Proxy/API error");
    const j = await r.json();
    const contents = j.contents || j;
    let parsed = null;
    try { parsed = typeof contents === "string" ? JSON.parse(contents) : contents; } catch(e){ parsed = contents; }
    if(Array.isArray(parsed)){
      const x = parsed.find(it => (it.symbol && /XAU/i.test(it.symbol)) || (it.code && /XAU/i.test(it.code)));
      if(x && x.price) return Number(x.price);
      // metals.live may return objects like {symbol:"XAU", price:1960.12}
      // if not found, try first numeric field
      for(const it of parsed){
        if(it.price) return Number(it.price);
      }
    }
    // fallback: تلاش برای یافتن عدد در متن
    const text = JSON.stringify(parsed);
    const m = text.match(/([0-9]+(?:\.[0-9]+)?)/);
    if(m) return Number(m[1]);
    throw new Error("Unable to parse sample API response");
  }
}

/* به‌روزرسانی قیمت با fallback شبیه‌سازی در صورت خطا */
async function updateXau(){
  try{
    const price = await fetchXauFromApi();
    if(Number.isFinite(price)){
      lastXauPrice = price;
      xauEl.innerText = formatPrice(price);
      flashXau();
      return;
    }
    throw new Error("Invalid price");
  }catch(err){
    // fallback شبیه‌سازی: اگر قیمت قبلی داریم، نوسان کوچک ایجاد کن، در غیر این صورت مقدار فرضی
    if(lastXauPrice === null){
      lastXauPrice = 1960.00;
    } else {
      const change = (Math.random() - 0.5) * 0.002 * lastXauPrice; // ±0.1% حدودی
      lastXauPrice = Math.max(0, lastXauPrice + change);
    }
    xauEl.innerText = formatPrice(lastXauPrice) + " *";
    flashXau();
  }
}

/* اجرا و زمان‌بندی: آپدیت سریع برای حس لحظه‌ای */
updateXau();
setInterval(updateXau, 3000); // هر 3 ثانیه آپدیت می‌شود

</script>
