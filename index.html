<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FX LEVEL Overlay</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
      color: #00ff88;
      font-family: 'Orbitron', sans-serif;
      overflow: hidden;
    }

    .overlay {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* وبکم */
.webcam {
  position: absolute;
  left: 2%;
  bottom: 14%;
  width: 15%;
  height: 24%;
  border: 3px solid #00ff88;
  border-radius: 12px;
  box-shadow: 0 0 18px #00ff88;
}

    .vip {
      position: absolute;
      left: 2%;
      bottom: 5%;
      font-size: 1.2em;
      color: #00ff88;
    }

    .support {
      position: absolute;
      left: 15%;
      bottom: 5%;
      font-size: 1.2em;
      color: #fff;
    }

    .session {
      position: absolute;
      top: 2%;
      left: 2%;
      font-size: 1.5em;
      color: #00ff88;
    }

    .news {
      position: absolute;
      top: 2%;
      left: 40%;
      font-size: 1.2em;
      color: #fff;
    }

    /* سه باکس ساعت */
    .clocks {
      position: absolute;
      top: 2%;
      right: 2%;
      display: flex;
      gap: 20px;
    }

    .clock-box {
      padding: 8px 14px;
      border: 2px solid #00ff88;
      border-radius: 8px;
      box-shadow: 0 0 10px #00ff88;
      font-size: 0.9em;
      text-align: center;
      min-width: 130px;
      font-family: monospace; /* جلوگیری از لرزش */
    }
  </style>
</head>

<body>
  <div class="overlay">

    <div class="session">LONDON SESSION</div>

    <div class="news" id="news">Loading next news...</div>

    <div class="clocks">
      <div class="clock-box" id="london"></div>
      <div class="clock-box" id="newyork"></div>
      <div class="clock-box" id="tehran"></div>
    </div>

    <div class="webcam"></div>
    <div class="vip">LEVEL VIP</div>
    <div class="support">Support Contact</div>

  </div>

  <!-- ساعت‌ها -->
  <script>
    function formatTime(timeZone) {
      var now = new Date();

      var options = {
        timeZone: timeZone,
        hour12: true,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      };

      var parts = now.toLocaleTimeString('en-US', options).split(" ");
      var time = parts[0];   // 01:20:30
      var ampm = parts[1];   // AM یا PM

      return ampm + " " + time;
    }

    function updateClock() {
      document.getElementById('london').innerHTML =
        "London<br>" + formatTime("Europe/London");

      document.getElementById('newyork').innerHTML =
        "New York<br>" + formatTime("America/New_York");

      document.getElementById('tehran').innerHTML =
        "Tehran<br>" + formatTime("Asia/Tehran");
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>

  <!-- خبر تستی -->
  <script>
    document.getElementById('news').innerText =
      "GDP m/m (USD) in 15 mins – High Impact";
  </script>

</body>
</html>
