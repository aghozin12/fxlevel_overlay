<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FX LEVEL Overlay</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
      color: #00ff88;
      font-family: 'Orbitron', sans-serif;
      overflow: hidden;
    }

    /* کانتینر اصلی با سایز واقعی 1080p */
    .overlay {
      width: 1920px;
      height: 1080px;
      position: relative;
      margin: 0 auto;
    }

    /* وبکم – نسخه فوق‌العاده نرم */
    .webcam {
      position: absolute;
      left: 40px;
      bottom: 160px;
      width: 280px;
      height: 380px;
      border: 2px solid #00ff88;
      border-radius: 12px;
      box-shadow: 0 0 9px #00ff88;
      animation: ultraUltraSoft 10s ease-in-out infinite alternate;
    }

    @keyframes ultraUltraSoft {
      0% {
        box-shadow: 0 0 9px #00ff88;
        border-color: #00ff88;
      }
      50% {
        box-shadow: 0 0 11px #33ff99;
        border-color: #33ff99;
      }
      100% {
        box-shadow: 0 0 9px #00ff88;
        border-color: #00ff88;
      }
    }

    /* متن VIP */
    .vip {
      position: absolute;
      left: 40px;
      bottom: 100px;
      font-size: 32px;
      color: #00ff88;
    }

    /* متن Support */
    .support {
      position: absolute;
      left: 200px;
      bottom: 100px;
      font-size: 32px;
      color: #fff;
    }

    /* سشن */
    .session {
      position: absolute;
      top: 40px;
      left: 40px;
      font-size: 42px;
      color: #00ff88;
    }

    /* خبر */
    .news {
      position: absolute;
      top: 40px;
      left: 700px;
      font-size: 32px;
      color: #fff;
    }

    /* باکس‌های ساعت */
    .clocks {
      position: absolute;
      top: 40px;
      right: 40px;
      display: flex;
      gap: 20px;
    }

    .clock-box {
      padding: 12px 18px;
      border: 2px solid #00ff88;
      border-radius: 8px;
      box-shadow: 0 0 10px #00ff88;
      font-size: 22px;
      text-align: center;
      width: 150px;
      font-family: monospace;
    }
  </style>
</head>

<body>
  <div class="overlay">

    <div class="session">LONDON SESSION</div>

    <div class="news" id="news">Loading next news...</div>

    <div class="clocks">
      <div class="clock-box" id="london"></div>
      <div class="clock-box" id="newyork"></div>
      <div class="clock-box" id="tehran"></div>
    </div>

    <div class="webcam"></div>
    <div class="vip">LEVEL VIP</div>
    <div class="support">Support Contact</div>

  </div>

  <!-- ساعت‌ها -->
  <script>
    function formatTime(timeZone) {
      var now = new Date();

      var options = {
        timeZone: timeZone,
        hour12: true,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      };

      var parts = now.toLocaleTimeString('en-US', options).split(" ");
      var time = parts[0];
      var ampm = parts[1];

      return ampm + " " + time;
    }

    function updateClock() {
      document.getElementById('london').innerHTML =
        "London<br>" + formatTime("Europe/London");

      document.getElementById('newyork').innerHTML =
        "New York<br>" + formatTime("America/New_York");

      document.getElementById('tehran').innerHTML =
        "Tehran<br>" + formatTime("Asia/Tehran");
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>

  <!-- خبر تستی -->
  <script>
    document.getElementById('news').innerText =
      "GDP m/m (USD) in 15 mins – High Impact";
  </script>

</body>
</html>
