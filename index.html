<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FX Overlay</title>

<style>

/* صفحه ثابت */
html, body {
    width: 1920px;
    height: 1080px;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
}

/* افکت شبکه‌ای پس‌زمینه */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(rgba(0,255,136,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
}

/* فریم زاویه‌دار اصلی */
.main-frame {
    position: absolute;
    top: 40px;
    left: 40px;
    width: calc(100% - 80px);
    height: calc(100% - 80px);

    clip-path: polygon(
        25px 0,
        calc(100% - 25px) 0,
        100% 25px,
        100% calc(100% - 25px),
        calc(100% - 25px) 100%,
        25px 100%,
        0 calc(100% - 25px),
        0 25px
    );

    background: rgba(0, 0, 0, 0.18);

    border: 3px solid #00ff88;
    box-shadow:
        0 0 25px #00ff88,
        inset 0 0 25px #00ff88;
}

/* نوار بالا */
.top-bar {
    position: absolute;
    top: 55px;
    left: 50%;
    transform: translateX(-50%);
    width: 86%;
    height: 90px;

    clip-path: polygon(
        18px 0,
        calc(100% - 18px) 0,
        100% 18px,
        100% 100%,
        0 100%,
        0 18px
    );

    background: rgba(0, 0, 0, 0.35);
    border: 2px solid #00ff88;
    box-shadow:
        0 0 14px #00ff88,
        inset 0 0 14px #00ff88;

    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 35px;
    box-sizing: border-box;
}

/* ساختار آیتم */
.top-item {
    flex: 1;
    display: flex;
    justify-content: center;
}

.item-row {
    display: flex;
    align-items: center;
    gap: 14px;
}

/* آیکون‌های SVG سفید */
.icon {
    width: 40px;
    height: 40px;
    stroke: #ffffff;
    fill: none;
    filter: drop-shadow(0 0 6px #00ff88);
}

/* متن‌ها */
.text-box {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
}

.text-box span:first-child {
    font-size: 12px;
    color: #ffae4a;
    text-shadow: 0 0 6px #ffae4a;
}

.text-box span:last-child {
    font-size: 18px;
    font-weight: bold;
    color: #00ff88;
    text-shadow: 0 0 8px #00ff88;
}

/* جداکننده سفید */
.divider {
    width: 1px;
    height: 60%;
    background: rgba(255,255,255,0.35);
}

/* نوار پایین */
.bottom-bar {
    position: absolute;
    bottom: 55px;
    left: 50%;
    transform: translateX(-50%);
    width: 86%;
    height: 80px;

    clip-path: polygon(
        0 0,
        100% 0,
        100% calc(100% - 18px),
        calc(100% - 18px) 100%,
        18px 100%,
        0 calc(100% - 18px)
    );

    background: rgba(0, 0, 0, 0.35);
    border: 2px solid #00ff88;
    box-shadow:
        0 0 14px #00ff88,
        inset 0 0 14px #00ff88;

    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    box-sizing: border-box;
}

.bottom-left {
    font-size: 28px;
    font-weight: bold;
    color: #00ff88;
    text-shadow: 0 0 10px #00ff88;
}

.bottom-right {
    display: flex;
    gap: 40px;
    font-size: 20px;
    color: #00ff88;
    text-shadow: 0 0 8px #00ff88;
}

/* قاب وبکم */
.webcam-frame {
    position: absolute;
    bottom: 170px;
    left: 80px;
    width: 430px;
    height: 250px;

    clip-path: polygon(
        20px 0,
        calc(100% - 20px) 0,
        100% 20px,
        100% calc(100% - 20px),
        calc(100% - 20px) 100%,
        20px 100%,
        0 calc(100% - 20px),
        0 20px
    );

    background: rgba(0, 0, 0, 0.25);
    border: 3px solid #00ff88;
    box-shadow:
        0 0 18px #00ff88,
        inset 0 0 18px #00ff88;
}

</style>
</head>

<body>

<div class="main-frame"></div>

<!-- نوار بالا با آیکون سفید -->
<div class="top-bar">

    <!-- SESSION -->
    <div class="top-item">
        <div class="item-row">
            <svg class="icon" viewBox="0 0 24 24">
<circle cx="12" cy="12" r="10" stroke-width="2"/>
                <path d="M12 6v6l4 2" stroke-width="2"/>
            </svg>
            <div class="text-box">
                <span>SESSION</span>
                <span id="session-value">London</span>
            </div>
        </div>
    </div>

    <div class="divider"></div>

    <!-- NEW YORK -->
    <div class="top-item">
        <div class="item-row">
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M12 1v22M1 12h22" stroke-width="2"/>
            </svg>
            <div class="text-box">
                <span>NEW YORK</span>
                <span id="newyork-value">--:--</span>
            </div>
        </div>
    </div>

    <div class="divider"></div>

    <!-- TEHRAN -->
    <div class="top-item">
        <div class="item-row">
            <svg class="icon" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" stroke-width="2"/>
                <path d="M12 12l4 2" stroke-width="2"/>
            </svg>
            <div class="text-box">
                <span>TEHRAN</span>
                <span id="tehran-value">--:--</span>
            </div>
        </div>
    </div>

    <div class="divider"></div>

    <!-- DATE -->
    <div class="top-item">
        <div class="item-row">
            <svg class="icon" viewBox="0 0 24 24">
                <rect x="3" y="5" width="18" height="16" stroke-width="2" fill="none"/>
                <line x1="3" y1="10" x2="21" y2="10" stroke-width="2"/>
            </svg>
            <div class="text-box">
                <span>DATE</span>
                <span id="date-value">-- --- ----</span>
            </div>
        </div>
    </div>

    <div class="divider"></div>

    <!-- NEWS -->
    <div class="top-item">
        <div class="item-row">
            <svg class="icon" viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="16" stroke-width="2" fill="none"/>
                <line x1="7" y1="8" x2="17" y2="8" stroke-width="2"/>
                <line x1="7" y1="12" x2="17" y2="12" stroke-width="2"/>
            </svg>
            <div class="text-box">
                <span>NEWS</span>
                <span>Waiting...</span>
            </div>
        </div>
    </div>

</div>

<div class="webcam-frame"></div>

<div class="bottom-bar">
    <div class="bottom-left">FX LEVEL</div>
    <div class="bottom-right">
        <span>Instagram</span>
        <span>Telegram</span>
        <span>VIP SIGNAL</span>
    </div>
</div>

<!-- اسکریپت ساعت + تاریخ + سشن -->
<script>
function updateClocks() {

    // ساعت تهران
    const tehranTime = new Date().toLocaleTimeString("en-US", {
        timeZone: "Asia/Tehran",
        hour12: true
    });

    // ساعت نیویورک
    const newYorkTime = new Date().toLocaleTimeString("en-US", {
        timeZone: "America/New_York",
        hour12: true
    });

    // تاریخ امروز
    const today = new Date().toLocaleDateString("en-US", {
        timeZone: "Asia/Tehran",
        day: "2-digit",
        month: "short",
        year: "numeric"
    });

    // تعیین سشن بر اساس ساعت تهران
    const tehranHour = new Date().toLocaleString("en-US", {
        timeZone: "Asia/Tehran",
        hour: "numeric",
        hour12: false
    });

    let sessionName = (tehranHour < 17) ? "London" : "New York";

    // نمایش در صفحه
    document.getElementById("session-value").innerText = sessionName;
    document.getElementById("tehran-value").innerText = tehranTime;
    document.getElementById("newyork-value").innerText = newYorkTime;
    document.getElementById("date-value").innerText = today;
}

setInterval(updateClocks, 1000);
updateClocks();
</script>

</body>
</html>
