<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FX Overlay Base</title>
<style>

body {
    margin: 0;
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
}

/* نوار بالایی */
.top-bar {
    width: 100%;
    height: 70px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    box-sizing: border-box;
}

/* هر آیتم نوار بالا */
.top-item {
    display: flex;
    flex-direction: column;
    text-align: center;
    font-size: 14px;
}

/* بخش وبکم */
.webcam-frame {
    width: 450px;
    height: 260px;
    margin: 40px auto;
    border: 3px solid #444;
    border-radius: 10px;
}

/* نوار پایین */
.bottom-bar {
    width: 100%;
    height: 90px;
    position: absolute;
    bottom: 0;
    left: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    box-sizing: border-box;
}

/* بخش چپ پایین */
.bottom-left {
    font-size: 22px;
    font-weight: bold;
}

/* بخش راست پایین */
.bottom-right {
    display: flex;
    gap: 20px;
    font-size: 18px;
}

</style>
</head>

<body>

<!-- نوار بالا -->
<div class="top-bar">

    <div class="top-item">
        <span>SESSION</span>
        <span id="session">London</span>
    </div>

    <div class="top-item">
        <span>NEW YORK</span>
        <span id="nytime">--:--</span>
    </div>

    <div class="top-item">
        <span>TEHRAN</span>
        <span id="tehrantime">--:--</span>
    </div>

    <div class="top-item">
        <span>DATE</span>
        <span id="date">-- --- ----</span>
    </div>

    <div class="top-item">
        <span>NEWS</span>
        <span id="news">Waiting...</span>
    </div>

</div>

<!-- قاب وبکم -->
<div class="webcam-frame"></div>

<!-- نوار پایین -->
<div class="bottom-bar">

    <div class="bottom-left">FX LEVEL</div>

    <div class="bottom-right">
        <span>Instagram</span>
        <span>Telegram</span>
        <span>VIP SIGNAL</span>
    </div>

</div>

</body>
</html>
